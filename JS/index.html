<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой счетчик</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f4f4f9;
            margin: 0;
        }
        .container {
            text-align: center;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #number {
            font-size: 48px;
            margin: 20px 0;
            font-weight: bold;
            color: #333;
        }
        button {
            font-size: 16px;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            transition: 0.2s;
        }
        #decrease-btn {
            background-color: #ff4d4d;
            color: white;
        }
        #decrease-btn:hover {
            background-color: #e60000;
        }
        #reset-btn {
            background-color: #cccccc;
            color: #333;
        }
        #reset-btn:hover {
            background-color: #b3b3b3;
        }
        #message {
            color: #d9534f;
            font-weight: bold;
            height: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="number">10</div>

    <button id="decrease-btn">Убавить</button>
    <button id="reset-btn">Сброс</button>

    <div id="message"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); // Подключаемся к нашему серверу

    const numberDisplay = document.getElementById('number');
    const messageDisplay = document.getElementById('message');

    // Нажатие кнопки теперь отправляет сигнал на сервер
    document.getElementById('decrease-btn').addEventListener('click', () => {
        socket.emit('decrease'); 
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
        socket.emit('reset');
    });

    // Слушаем ответы от сервера. Когда сервер говорит "число изменилось", меняем экран
    socket.on('update_count', (newCount) => {
        numberDisplay.textContent = newCount;
        messageDisplay.textContent = ""; // сбрасываем ошибку
    });

    socket.on('error_msg', (msg) => {
        messageDisplay.textContent = msg;
    });
</script>

</body>
</html>
